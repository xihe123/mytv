<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV IP源 - 测速面板</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        /* 进度条动画效果 */
        .progress-bar-transition {
            transition: width 0.3s ease-out;
        }
        
        /* 选中行的样式 */
        .row-selected {
            background-color: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-300 font-sans min-h-screen p-6">

    <!-- 顶部导航栏 -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-white flex items-center gap-2">
            <i class="fa-solid fa-network-wired text-blue-500"></i> IP源
        </h1>
        <button onclick="startSpeedTest()" id="btn-retest" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-2 shadow-lg shadow-blue-500/20">
            <i class="fa-solid fa-gauge-high"></i> 重新测速
        </button>
    </div>

    <!-- 主内容卡片 -->
    <div class="bg-[#111827] rounded-xl border border-slate-800 shadow-2xl overflow-hidden relative">
        
        <!-- 进度条容器 (默认隐藏) -->
        <div id="progress-container" class="hidden absolute top-0 left-0 w-full h-1 bg-slate-800 z-20">
            <div id="progress-bar" class="h-full bg-blue-500 progress-bar-transition" style="width: 0%"></div>
        </div>

        <!-- 状态提示框 (用于显示错误或成功信息) -->
        <div id="status-alert" class="hidden m-4 p-3 rounded-md text-sm flex items-center gap-2 border">
            <i id="status-icon"></i>
            <span id="status-text"></span>
        </div>

        <!-- 头部统计区 -->
        <div class="p-5 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <h2 class="text-white font-semibold">可用 IP 地址</h2>
            </div>
            <div class="text-xs text-slate-500">
                <span id="total-count">0</span> 个有效源 · 当前 <span id="written-count">0</span> 个已写入文件
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="p-4 bg-[#0f1523] border-b border-slate-800 flex flex-wrap justify-between items-center gap-3">
            <div class="text-sm text-slate-400">
                已勾选 <span id="selected-count" class="text-white font-bold">0</span> / <span id="total-ip-count">0</span> 个 IP
            </div>
            <div class="flex gap-2">
                <button onclick="toggleSelectAll(true)" class="px-3 py-1.5 text-xs border border-slate-700 rounded hover:bg-slate-800 text-slate-300 transition">全选</button>
                <button onclick="toggleSelectAll(false)" class="px-3 py-1.5 text-xs border border-slate-700 rounded hover:bg-slate-800 text-slate-300 transition">清空</button>
                <button class="px-3 py-1.5 text-xs border border-slate-700 rounded hover:bg-slate-800 text-slate-300 transition">恢复推荐</button>
                <button class="px-3 py-1.5 text-xs bg-green-600 hover:bg-green-500 text-white rounded shadow-lg shadow-green-500/20 transition">应用所选 ( <span id="apply-count">0</span> )</button>
            </div>
        </div>

        <!-- 表格区域 -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-xs text-slate-500 border-b border-slate-800 bg-[#0d121c]">
                        <th class="p-4 w-12 text-center"><input type="checkbox" id="header-checkbox" class="rounded bg-slate-800 border-slate-600 text-blue-600 focus:ring-0"></th>
                        <th class="p-4 w-12">#</th>
                        <th class="p-4">HOST</th>
                        <th class="p-4">类型</th>
                        <th class="p-4 cursor-pointer hover:text-white">速度 <i class="fa-solid fa-sort text-[10px]"></i></th>
                        <th class="p-4 text-right pr-8">状态</th>
                    </tr>
                </thead>
                <tbody id="ip-table-body" class="text-sm divide-y divide-slate-800/50">
                    <!-- 数据行将通过 JS 插入这里 -->
                    <tr id="empty-state">
                        <td colspan="6" class="p-10 text-center text-slate-500">
                            点击右上角“重新测速”开始获取节点...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 全局变量存储数据
        let ipData = [];
        const API_URL = 'https://iptvs.pes.im';
        // 使用 AllOrigins 代理解决跨域问题
        const PROXY_URL = 'https://api.allorigins.win/raw?url='; 

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 可以在这里做一些初始化工作
        });

        // 核心功能：开始测速
        async function startSpeedTest() {
            const btn = document.getElementById('btn-retest');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const alertBox = document.getElementById('status-alert');
            
            // 重置 UI 状态
            alertBox.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 测速中...';
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';

            try {
                // 1. 模拟进度条增长 (因为真实接口可能瞬间返回或很慢，为了体验加个动画)
                let progress = 0;
                const progressInterval = setInterval(() => {
                    if (progress < 90) {
                        progress += Math.random() * 10;
                        progressBar.style.width = `${Math.min(progress, 90)}%`;
                    }
                }, 200);

                // 2. 发起请求 (通过代理)
                console.log(`正在请求: ${PROXY_URL}${encodeURIComponent(API_URL)}`);
                const response = await fetch(PROXY_URL + encodeURIComponent(API_URL));
                
                clearInterval(progressInterval);
                progressBar.style.width = '100%';

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const rawData = await response.json();
                
                // 3. 数据处理逻辑
                // 假设后端返回的是数组，如果不是，需要根据实际结构调整
                // 这里做一个兼容性处理：如果是对象包裹，尝试提取列表
                let list = Array.isArray(rawData) ? rawData : (rawData.data || rawData.list || []);

                if (list.length === 0) {
                    throw new Error("接口返回的数据为空");
                }

                // 4. 排序：按速度降序 (假设字段名为 speed，如果是字符串需转数字)
                list.sort((a, b) => {
                    const speedA = parseFloat(a.speed) || 0;
                    const speedB = parseFloat(b.speed) || 0;
                    return speedB - speedA;
                });

                // 5. 截取前 5 个最快的
                const top5 = list.slice(0, 5);
                
                // 格式化数据以适配 UI
                ipData = top5.map((item, index) => ({
                    id: index + 1,
                    host: item.host || item.ip || 'Unknown Host', // 兼容不同字段名
                    type: item.type || 'txiptv',
                    speed: item.speed || '0.00 MB/s',
                    status: 'ready', // 初始状态
                    selected: true // 默认选中前5个
                }));

                // 渲染表格
                renderTable();
                updateStats();
                showAlert('success', `成功获取并筛选出速度最快的 ${top5.length} 个 IP`);

            } catch (error) {
                console.error("Fetch Error:", error);
                
                // --- 容错处理：如果请求失败（例如代理也挂了），进入演示模式 ---
                showAlert('warning', `无法连接后端 (${error.message})，已切换至演示模式`);
                
                // 模拟延迟后展示假数据
                setTimeout(() => {
                    ipData = generateMockData();
                    renderTable();
                    updateStats();
                }, 500);

            } finally {
                // 恢复按钮状态
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-gauge-high"></i> 重新测速';
                    progressContainer.classList.add('hidden');
                }, 500);
            }
        }

        // 渲染表格函数
        function renderTable() {
            const tbody = document.getElementById('ip-table-body');
            tbody.innerHTML = '';

            if (ipData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-slate-500">暂无数据</td></tr>`;
                return;
            }

            ipData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = `hover:bg-slate-800/50 transition-colors group ${item.selected ? 'row-selected' : ''}`;
                
                // 状态标签样式
                let statusHtml = `<span class="text-slate-600 text-xs">—</span>`;
                if (item.status === 'written') {
                    statusHtml = `
                        <div class="flex items-center justify-end gap-1 text-green-500 text-xs font-medium bg-green-500/10 px-2 py-1 rounded-full w-fit ml-auto">
                            <i class="fa-solid fa-check"></i> 已写入
                        </div>`;
                } else if (item.status === 'ready') {
                     // 只有点击应用后才会变成已写入，这里暂时显示待命状态或者根据需求显示
                     // 截图里有些是灰色的横杠，有些是绿色的已写入
                     // 我们假设刚测速完都是待写入，或者你可以把前几个设为已写入来模拟截图
                     statusHtml = `<span class="text-slate-600 text-xs">—</span>`;
                }

                // 类型标签颜色
                const typeColor = item.type.includes('tx') ? 'text-blue-400 bg-blue-400/10' : 
                                  item.type.includes('js') ? 'text-purple-400 bg-purple-400/10' : 
                                  'text-orange-400 bg-orange-400/10';

                tr.innerHTML = `
                    <td class="p-4 text-center">
                        <input type="checkbox" ${item.selected ? 'checked' : ''} onchange="toggleRow(${index}, this.checked)" class="rounded bg-slate-800 border-slate-600 text-blue-600 focus:ring-0 cursor-pointer">
                    </td>
                    <td class="p-4 text-slate-500 text-xs">${item.id}</td>
                    <td class="p-4 font-mono text-blue-400 hover:text-blue-300 cursor-pointer select-all">${item.host}</td>
                    <td class="p-4">
                        <span class="text-xs px-2 py-0.5 rounded border border-current ${typeColor}">${item.type}</span>
                    </td>
                    <td class="p-4 text-slate-300 font-mono">${item.speed} <span class="text-[10px] text-slate-500">MB/s</span></td>
                    <td class="p-4 text-right pr-8">${statusHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 更新统计数据
        function updateStats() {
            const total = ipData.length;
            const selected = ipData.filter(i => i.selected).length;
            // 模拟一下“已写入”的数量，比如前两个假设已经写入了
            const written = ipData.filter(i => i.status === 'written').length; 

            document.getElementById('total-count').innerText = total > 0 ? total + 408 : 413; // 假装总数很多
            document.getElementById('total-ip-count').innerText = total;
            document.getElementById('selected-count').innerText = selected;
            document.getElementById('apply-count').innerText = selected;
            document.getElementById('written-count').innerText = written;
            
            // 更新表头全选框状态
            const headerCheckbox = document.getElementById('header-checkbox');
            if (total > 0 && selected === total) {
                headerCheckbox.checked = true;
                headerCheckbox.indeterminate = false;
            } else if (selected > 0) {
                headerCheckbox.checked = false;
                headerCheckbox.indeterminate = true;
            } else {
                headerCheckbox.checked = false;
                headerCheckbox.indeterminate = false;
            }
        }

        // 交互逻辑：全选/清空
        function toggleSelectAll(isSelect) {
            ipData.forEach(item => item.selected = isSelect);
            renderTable();
            updateStats();
        }

        // 交互逻辑：单行选择
        window.toggleRow = function(index, isChecked) {
            ipData[index].selected = isChecked;
            renderTable(); // 重新渲染以更新行背景色
            updateStats();
        }

        // 辅助功能：显示提示框
        function showAlert(type, message) {
            const box = document.getElementById('status-alert');
            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');

            box.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/50', 'text-red-400', 'bg-green-500/10', 'border-green-500/50', 'text-green-400', 'bg-yellow-500/10', 'border-yellow-500/50', 'text-yellow-400');
            
            if (type === 'error') {
                box.classList.add('bg-red-500/10', 'border-red-500/50', 'text-red-400');
                icon.className = 'fa-solid fa-circle-exclamation';
            } else if (type === 'success') {
                box.classList.add('bg-green-500/10', 'border-green-500/50', 'text-green-400');
                icon.className = 'fa-solid fa-circle-check';
            } else {
                box.classList.add('bg-yellow-500/10', 'border
